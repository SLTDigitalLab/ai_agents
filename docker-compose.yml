version: "3.8"

services:
  db_postgres:
    image: ankane/pgvector:latest
    container_name: slt_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slt -d slt_db"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: slt
      POSTGRES_PASSWORD: slt123
      POSTGRES_DB: slt_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always

  db_qdrant:
    image: qdrant/qdrant:latest
    container_name: slt_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: always

  db_redis:
    image: redis:7-alpine
    container_name: slt_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
    container_name: slt_backend
    ports:
      - "8000:8000"
    depends_on:
      db_postgres:
        condition: service_healthy
      db_qdrant:
        condition: service_started
      db_redis:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_URL: postgresql://slt:slt123@db_postgres:5432/slt_db
      QDRANT_URL: http://slt_qdrant:6333
      REDIS_URL: redis://db_redis:6379/0
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: slt_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
